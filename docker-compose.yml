services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword123
      DOCKER_INFLUXDB_INIT_ORG: aerobatics
      DOCKER_INFLUXDB_INIT_BUCKET: drone_diagnostics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      # Retention period for the initial bucket — data older than this is
      # deleted automatically. Set via INFLUXDB_RETENTION in .env.
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION:-90d}
      # In-memory write-cache cap. Set via INFLUXDB_CACHE_MAX_MEMORY_SIZE in .env.
      INFLUXD_STORAGE_CACHE_MAX_MEMORY_SIZE: ${INFLUXDB_CACHE_MAX_MEMORY_SIZE:-104857600}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  influxdb_data:
